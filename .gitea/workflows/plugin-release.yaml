name: Plugin Release (Gitea)

# Gitea-compatible version of .github/workflows/plugin-release.yaml
# Inlines all logic since Gitea does not support reusable workflows from
# external repositories or composite actions that pull from github.com.
#
# Usage from a plugin repo's .gitea/workflows/publish.yaml:
#   jobs:
#     release:
#       uses: <org>/kuberse/.gitea/workflows/plugin-release.yaml@main

on:
  workflow_call:
    inputs:
      registry-images:
        description: Registry URL for images (e.g. gitea-host:3000/org)
        type: string
        required: true
      registry-charts:
        description: OCI registry URL for charts (e.g. oci://gitea-host:3000/org/charts)
        type: string
        required: true
      registry-manifest:
        description: OCI manifest artifact URL (e.g. gitea-host:3000/org/plugin-manifest)
        type: string
        required: true
      registry-user:
        description: Registry username
        type: string
        required: true
      force-rebuild:
        description: Force rebuild of all artifacts without creating a new tag
        type: boolean
        required: false
        default: false
    secrets:
      registry-password:
        description: Registry password or token
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Compute version ──
      - name: Compute version
        id: semver
        shell: bash
        run: |
          PREV_TAG=$(git tag -l 'v*' --sort=-v:refname | head -1)
          if [ -z "$PREV_TAG" ]; then
            PREV_TAG=""
            PREV_VERSION="0.0.0"
          else
            PREV_VERSION="${PREV_TAG#v}"
          fi

          echo "prev-tag=$PREV_TAG" >> "$GITHUB_OUTPUT"

          if [ "${{ inputs.force-rebuild }}" = "true" ]; then
            echo "bump=rebuild" >> "$GITHUB_OUTPUT"
            echo "version=$PREV_VERSION" >> "$GITHUB_OUTPUT"
            echo "Force rebuild: using version $PREV_VERSION"
            exit 0
          fi

          IFS='.' read -r MAJOR MINOR PATCH <<< "$PREV_VERSION"

          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log "$PREV_TAG"..HEAD --format="%s")
          else
            COMMITS=$(git log --format="%s")
          fi

          if [ -z "$COMMITS" ]; then
            echo "No new commits since $PREV_TAG"
            echo "bump=none" >> "$GITHUB_OUTPUT"
            echo "version=$PREV_VERSION" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BUMP="none"
          while IFS= read -r msg; do
            case "$msg" in
              *"BREAKING CHANGE"*|*"!"*) BUMP="major" ;;
            esac
          done <<< "$COMMITS"

          if [ "$BUMP" = "none" ]; then
            while IFS= read -r msg; do
              case "$msg" in
                feat*) [ "$BUMP" != "major" ] && BUMP="minor" ;;
              esac
            done <<< "$COMMITS"
          fi

          if [ "$BUMP" = "none" ]; then
            while IFS= read -r msg; do
              case "$msg" in
                fix*|perf*|refactor*) BUMP="patch" ;;
              esac
            done <<< "$COMMITS"
          fi

          [ "$BUMP" = "none" ] && BUMP="patch"

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Bump: $BUMP | $PREV_VERSION -> $NEW_VERSION"

      # ── Detect changes ──
      - name: Detect changes
        id: changes
        if: steps.semver.outputs.bump != 'none'
        shell: bash
        run: |
          FORCE="${{ inputs.force-rebuild }}"
          PREV_TAG="${{ steps.semver.outputs.prev-tag }}"

          if [ "$FORCE" = "true" ]; then
            CHARTS='[]'
            IMAGES='[]'
            if [ -d src ]; then
              for app_dir in src/*/; do
                app=$(basename "$app_dir")
                if [ -d "src/$app/chart" ]; then
                  CHARTS=$(echo "$CHARTS" | jq -c --arg a "$app" '. + [$a]')
                fi
                if [ -d "src/$app/containers" ]; then
                  for img_dir in src/$app/containers/*/; do
                    [ -d "$img_dir" ] || continue
                    img=$(basename "$img_dir")
                    IMAGES=$(echo "$IMAGES" | jq -c --arg a "$app/$img" '. + [$a]')
                  done
                fi
              done
            fi
          else
            if [ -n "$PREV_TAG" ]; then
              CHANGED=$(git diff --name-only "$PREV_TAG"..HEAD)
            else
              CHANGED=$(git ls-files)
            fi

            CHARTS='[]'
            IMAGES='[]'
            if [ -d src ]; then
              for app_dir in src/*/; do
                app=$(basename "$app_dir")
                if [ -d "src/$app/chart" ] && echo "$CHANGED" | grep -q "^src/$app/chart/"; then
                  CHARTS=$(echo "$CHARTS" | jq -c --arg a "$app" '. + [$a]')
                fi
                if [ -d "src/$app/containers" ]; then
                  for img_dir in src/$app/containers/*/; do
                    [ -d "$img_dir" ] || continue
                    img=$(basename "$img_dir")
                    if echo "$CHANGED" | grep -q "^src/$app/containers/$img/"; then
                      IMAGES=$(echo "$IMAGES" | jq -c --arg a "$app/$img" '. + [$a]')
                    fi
                  done
                fi
              done
            fi
          fi

          echo "charts=$CHARTS" >> "$GITHUB_OUTPUT"
          echo "images=$IMAGES" >> "$GITHUB_OUTPUT"
          echo "Charts: $CHARTS | Images: $IMAGES"

      # ── Build and push charts ──
      - name: Build and push charts
        if: steps.semver.outputs.bump != 'none' && steps.changes.outputs.charts != '[]'
        shell: bash
        env:
          REGISTRY: ${{ inputs.registry-charts }}
          USER: ${{ inputs.registry-user }}
          PASSWORD: ${{ secrets.registry-password }}
        run: |
          REGISTRY_HOST=$(echo "$REGISTRY" | sed 's|oci://||' | cut -d/ -f1)
          echo "$PASSWORD" | helm registry login "$REGISTRY_HOST" -u "$USER" --password-stdin --insecure
          echo "$PASSWORD" | oras login "$REGISTRY_HOST" -u "$USER" --password-stdin --insecure

          for app in $(echo '${{ steps.changes.outputs.charts }}' | jq -r '.[]'); do
            chart_dir="src/$app/chart"
            NAME=$(grep '^name:' "$chart_dir/Chart.yaml" | awk '{print $2}')
            CHART_VERSION=$(grep '^version:' "$chart_dir/Chart.yaml" | awk '{print $2}' | tr -d '"')

            if grep -q '^dependencies:' "$chart_dir/Chart.yaml" 2>/dev/null; then
              if [ -d "$chart_dir/charts" ]; then
                for sub in "$chart_dir"/charts/*/; do
                  [ -d "$sub" ] || continue
                  if [ -f "$sub/Chart.yaml" ] && grep -q '^dependencies:' "$sub/Chart.yaml" 2>/dev/null; then
                    helm dependency update "$sub"
                  fi
                done
              fi
              helm dependency update "$chart_dir/"
            fi

            helm package "$chart_dir/"
            helm push "${NAME}-${CHART_VERSION}.tgz" "$REGISTRY" --plain-http
            rm -f "${NAME}-${CHART_VERSION}.tgz"

            REGISTRY_PATH=$(echo "$REGISTRY" | sed 's|oci://||')
            oras tag --plain-http "${REGISTRY_PATH}/${NAME}:${CHART_VERSION}" latest

            echo "Pushed chart $NAME:$CHART_VERSION + latest"
          done

      # ── Build and push images ──
      - name: Build and push images
        if: steps.semver.outputs.bump != 'none' && steps.changes.outputs.images != '[]'
        shell: bash
        env:
          REGISTRY: ${{ inputs.registry-images }}
          USER: ${{ inputs.registry-user }}
          PASSWORD: ${{ secrets.registry-password }}
          VERSION: ${{ steps.semver.outputs.version }}
        run: |
          REGISTRY_HOST=$(echo "$REGISTRY" | cut -d/ -f1)
          echo "$PASSWORD" | docker login "$REGISTRY_HOST" -u "$USER" --password-stdin

          for entry in $(echo '${{ steps.changes.outputs.images }}' | jq -r '.[]'); do
            app=$(echo "$entry" | cut -d/ -f1)
            img=$(echo "$entry" | cut -d/ -f2)
            docker build \
              --tag "$REGISTRY/$img:$VERSION" \
              --tag "$REGISTRY/$img:latest" \
              "src/$app/containers/$img/"
            docker push "$REGISTRY/$img:$VERSION"
            docker push "$REGISTRY/$img:latest"
            echo "Pushed image $img:$VERSION + latest"
          done

      # ── Publish OCI manifest + git tag ──
      - name: Publish OCI manifest
        if: steps.semver.outputs.bump != 'none'
        shell: bash
        working-directory: template
        env:
          USER: ${{ inputs.registry-user }}
          PASSWORD: ${{ secrets.registry-password }}
          VERSION: ${{ steps.semver.outputs.version }}
          MANIFEST_REF: ${{ inputs.registry-manifest }}
        run: |
          REGISTRY_HOST=$(echo "$MANIFEST_REF" | cut -d/ -f1)
          echo "$PASSWORD" | oras login "$REGISTRY_HOST" -u "$USER" --password-stdin --insecure

          # Update plugin.yaml version
          sed -i "s/^  version:.*/  version: $VERSION/" plugin.yaml

          # Resolve chart versions in plugin.yaml
          if command -v python3 &>/dev/null; then
            python3 - <<'PY'
          import re
          from pathlib import Path

          plugin = Path("plugin.yaml")
          text = plugin.read_text()
          chart_pattern = re.compile(r"(oci://[^\s]+/charts/([A-Za-z0-9._-]+)):latest")

          def resolve(match):
              base, name = match.group(1), match.group(2)
              chart_yaml = Path(f"../src/{name}/chart/Chart.yaml")
              if not chart_yaml.exists():
                  return match.group(0)
              for line in chart_yaml.read_text().splitlines():
                  if line.startswith("version:"):
                      ver = line.split(":", 1)[1].strip().strip('"').strip("'")
                      return f"{base}:{ver}"
              return match.group(0)

          plugin.write_text(chart_pattern.sub(resolve, text))
          PY
          fi

          oras push --plain-http "${MANIFEST_REF}:${VERSION}" .
          oras push --plain-http "${MANIFEST_REF}:latest" .
          echo "Published manifest: $VERSION + latest"

      - name: Create git tag
        if: steps.semver.outputs.bump != 'none' && steps.semver.outputs.bump != 'rebuild'
        shell: bash
        env:
          VERSION: ${{ steps.semver.outputs.version }}
        run: |
          git config user.name "gitea-actions[bot]"
          git config user.email "gitea-actions[bot]@noreply.localhost"
          git tag -a "v${VERSION}" -m "Release v${VERSION}"
          git push origin "v${VERSION}"
