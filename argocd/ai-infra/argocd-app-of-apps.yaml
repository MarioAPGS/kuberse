apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bootstrap-ai-infra
  namespace: argocd
  annotations:
    # Wave 2: Applications and plugins - after platform (wave 1)
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: ${GIT_BASE_URL}/kuberse-ai
    targetRevision: main
    path: charts
    directory:
      recurse: true
      include: "*/argocd-app.yaml"
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
