apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-config
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    chart: platform
    repoURL: oci://gitea-http.platform.svc.cluster.local:3000/marioapgs/kuberse/helm/platform
    targetRevision: latest
    helm:
      values: |
        argocd-config:
          enabled: true
          ingress:
            enabled: true
            className: nginx
            host: "argocd.kuberse.net"
            tls:
              enabled: false
          oidc:
            enabled: true
            url: "https://argocd.kuberse.net"
            issuer: "https://auth.kuberse.net/application/o/argocd/"
            name: "Authentik"
            scopes:
              - openid
              - profile
              - email
              - groups
          vault:
            enabled: true
            host: http://vault.platform.svc.cluster.local:8200
            serviceAccountName: argocd-server
            secretPath: "argocd/oidc"
            role:
              ttl: "24h"
              paths:
                - path: "secret/data/argocd/*"
                  capabilities: ["create", "read", "update"]
                - path: "secret/metadata/argocd/*"
                  capabilities: ["read", "list"]
          authentikOidc:
            enabled: true
            name: ArgoCD
            slug: argocd
            redirectUris:
              - url: "https://argocd.kuberse.net/auth/callback"
                matchingMode: strict
            application:
              launchUrl: "https://argocd.kuberse.net"
            vault:
              secretPath: "argocd/oidc"
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
