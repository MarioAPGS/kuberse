apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-config
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    chart: platform
    repoURL: oci://${REGISTRY_URL}/${ORG_NAME}/kuberse/helm/platform
    targetRevision: ${PLATFORM_VERSION}
    helm:
      values: |
        argocd-config:
          enabled: true
          ingress:
            host: "argocd.${BASE_DOMAIN}"
          oidc:
            url: "https://argocd.${BASE_DOMAIN}"
            issuer: "https://auth.${BASE_DOMAIN}/application/o/argocd/"
          authentikOidc:
            redirectUris:
              - url: "https://argocd.${BASE_DOMAIN}/auth/callback"
                matchingMode: strict
            application:
              launchUrl: "https://argocd.${BASE_DOMAIN}"
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
