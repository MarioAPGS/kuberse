apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kubrain
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    chart: platform
    repoURL: oci://${REGISTRY_URL}/${ORG_NAME}/kuberse/helm/platform
    targetRevision: latest
    helm:
      values: |
        kubrain:
          enabled: true
          replicaCount: 1
          ingress:
            enabled: true
            className: nginx
            host: "kubrain.${BASE_DOMAIN}"
            tls:
              enabled: false
          image:
            repository: ${REGISTRY_URL}/${ORG_NAME}/kuberse/img/kubrain
            tag: latest
            pullPolicy: Always
          authentikOidc:
            enabled: true
            name: Kubrain
            slug: kubrain
            issuer: "https://auth.${BASE_DOMAIN}/application/o/kubrain/"
            redirectUris:
              - url: "https://kubrain.${BASE_DOMAIN}/auth/callback"
                matchingMode: strict
            provider:
              clientType: public
              clientId: kubrain
              subMode: hashed_user_id
            application:
              launchUrl: "https://kubrain.${BASE_DOMAIN}"
          vault:
            enabled: true
            host: http://vault.platform.svc.cluster.local:8200
            serviceAccountName: kubrain
            secretPath: kubrain/config
            role:
              ttl: '24h'
              paths:
                - path: 'secret/data/kubrain/*'
                  capabilities: ['create', 'read', 'update']
                - path: 'secret/metadata/kubrain/*'
                  capabilities: ['read', 'list']
                - path: 'secret/data/*'
                  capabilities: ['create', 'read', 'update']
                - path: 'secret/metadata/*'
                  capabilities: ['read', 'list']
                - path: 'buildapps/data/*'
                  capabilities: ['create', 'read', 'update', 'delete', 'list']
                - path: 'buildapps/metadata/*'
                  capabilities: ['read', 'list', 'delete']
                - path: 'sys/policies/acl/*'
                  capabilities: ['create', 'read', 'update', 'delete']
                - path: 'auth/kubernetes/role/*'
                  capabilities: ['create', 'read', 'update', 'delete']
          configFile:
            enabled: true
            content: |
              database:
                url: env.PG_CONNECTION_STRING
                synchronize: true
              auth:
                # Identity/permission cache TTL in seconds (integer >= 0). Default 3600.
                # 0 disables caching so permission changes apply without a pod restart.
                cacheTtlSeconds: 0
                providers:
                  - id: authentik
                    displayName: Authentik
                    issuer: https://auth.${BASE_DOMAIN}/application/o/kubrain/
                    audience: kubrain
                    clientId: kubrain
                    subjectClaim: sub
                    scopes: [openid, profile, email]
                    insecureSkipVerify: true
              ingestion:
                github:
                  owner: ${ORG_NAME}
                  match: "**/kuberse-entity.yaml"
                  fetch: "*/5 * * * *"
                  token: k8s.platform.kuberse-config.github_token
                gitea:
                  url: http://${REGISTRY_URL}
                  organization: ${ORG_NAME}
                  match: "**/kuberse-entity.yaml"
                  fetch: "*/5 * * * *"
                  token: k8s.platform.kuberse-config.gitea_token
              argocd:
                url: https://argocd-server.argocd.svc.cluster.local
                insecure: true
                username: admin
                password: k8s.platform.kuberse-config.admin_password
              vault:
                url: env.VAULT_URL
              buildapp:
                chartRepo: oci://${REGISTRY_URL}/${ORG_NAME}/kuberse/helm/buildapp
                chartVersion: latest
          resources:
            limits:
              cpu: 1000m
              memory: 1Gi
            requests:
              cpu: 250m
              memory: 512Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: platform
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
