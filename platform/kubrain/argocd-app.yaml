apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kubrain
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    chart: platform
    repoURL: oci://gitea-http.platform.svc.cluster.local:3000/marioapgs/kuberse/helm/platform
    targetRevision: latest
    helm:
      values: |
        kubrain:
          enabled: true
          ingress:
            host: "kubrain.kuberse.net"
          image:
            repository: gitea-http.platform.svc.cluster.local:3000/marioapgs/kuberse/img/kubrain
            pullPolicy: Always
          configFile:
            enabled: true
            content: |
              database:
                url: env.PG_CONNECTION_STRING
                synchronize: true
              ingestion:
                github:
                  owner: marioapgs
                  match: "**/kuberse-entity.yaml"
                  fetch: "*/5 * * * *"
                  token: k8s.platform.kuberse-config.github_token
                gitea:
                  url: http://gitea-http.platform.svc.cluster.local:3000
                  organization: marioapgs
                  match: "**/kuberse-entity.yaml"
                  fetch: "*/5 * * * *"
                  token: k8s.platform.kuberse-config.gitea_token
              argocd:
                url: https://argocd-server.argocd.svc.cluster.local
                insecure: true
                username: admin
                password: k8s.platform.kuberse-config.admin_password
              vault:
                url: env.VAULT_URL
              buildapp:
                chartRepo: oci://gitea-http.platform.svc.cluster.local:3000/marioapgs/kuberse/helm/buildapp
                chartVersion: latest
  destination:
    server: https://kubernetes.default.svc
    namespace: platform
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
