---
kind: System
metadata:
  name: kubrain
  namespace: platform
  title: Kubrain
  description: >
    Kuberse control plane UI for the visual catalog, BuildApps, ArgoCD live
    resources, and the integrated documentation portal.
  annotations:
    kubernetes-id: kubrain
    kubernetes-namespace: platform
    kubernetes-label-selector: app.kubernetes.io/name=kubrain
    argocd-app: kubrain
  links:
    - url: https://kubrain.kuberse.net
      title: Kubrain UI
      icon: dashboard
spec:
  type: control-plane
  owner: group:default/admins
  domain: default/kuberse
