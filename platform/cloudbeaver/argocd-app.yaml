apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudbeaver
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    chart: platform
    repoURL: oci://${REGISTRY_URL}/${ORG_NAME}/kuberse/helm/platform
    targetRevision: latest
    helm:
      values: |
        cloudbeaver:
          enabled: true
          image:
            repository: dbeaver/cloudbeaver
            tag: "25.2.5"
            pullPolicy: IfNotPresent
          deployment:
            replicas: 1
          resources:
            limits:
              cpu: 500m
              memory: 1Gi
            requests:
              cpu: 100m
              memory: 256Mi
          persistence:
            enabled: true
            size: 2Gi
            storageClass: ""
          ingress:
            enabled: true
            className: nginx
             host: "cloudbeaver.${BASE_DOMAIN}"
            tls:
              enabled: false
          admin:
            credSecretName: "kuberse-config"
          dbOnboarding:
            cronSchedule: "*/5 * * * *"
            namespaceToSearch: null
  destination:
    server: https://kubernetes.default.svc
    namespace: platform
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
