apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: playhouse
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    chart: buildapp
    repoURL: oci://${REGISTRY_URL}/${ORG_NAME}/kuberse/helm/buildapp
    targetRevision: latest
    helm:
      values: |
        labName: playhouse

        # Use kubrain SA (cluster-wide access)
        serviceAccountCreate: false
        serviceAccountName: kubrain

        # No Vault needed
        vault: null

        # Dev container with OpenCode agent + code-server
        dev:
          image:
             repository: ${REGISTRY_URL}/${ORG_NAME}/kuberse/img/dev-kit
            tag: latest
            pullPolicy: IfNotPresent
          env:
            - name: AGENT_MODE
              value: "true"
          storage: 10Gi
          ssh:
            port: 22
            user: dev
            exposeService: true
          ports:
            - name: code
              port: 8080
            - name: agent
              port: 4096
          # Tightened to prevent SystemOOM on 5Gi workers (see buildapp values.yaml).
          resources:
            requests:
              cpu: 500m
              memory: 1500Mi
            limits:
              cpu: 2000m
              memory: 2500Mi

        services: {}
  destination:
    server: https://kubernetes.default.svc
    namespace: platform
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  ignoreDifferences:
    - group: ""
      kind: Service
      jsonPointers:
        - /spec/clusterIP
        - /spec/clusterIPs
