name: Plugin Release

on:
  workflow_call:
    inputs:
      registry-images:
        description: Registry URL for images (e.g. ghcr.io/org)
        type: string
        required: true
      registry-charts:
        description: OCI registry URL for charts (e.g. oci://ghcr.io/org/plugin-name-plugin/charts)
        type: string
        required: true
      registry-manifest:
        description: OCI manifest artifact URL (e.g. ghcr.io/org/plugin-name-plugin)
        type: string
        required: true
      registry-user:
        description: Registry username
        type: string
        required: true
      force-rebuild:
        description: Force rebuild of all artifacts without creating a new tag
        type: boolean
        required: false
        default: false
    secrets:
      registry-password:
        description: Registry password or token
        required: true

jobs:
  # ── Determine version ──
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.semver.outputs.version }}
      bump: ${{ steps.semver.outputs.bump }}
      prev-tag: ${{ steps.semver.outputs.prev-tag }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version
        id: semver
        shell: bash
        run: |
          PREV_TAG=$(git tag -l 'v*' --sort=-v:refname | head -1)
          if [ -z "$PREV_TAG" ]; then
            PREV_TAG=""
            PREV_VERSION="0.0.0"
          else
            PREV_VERSION="${PREV_TAG#v}"
          fi

          echo "prev-tag=$PREV_TAG" >> "$GITHUB_OUTPUT"

          # If force-rebuild, use current version and skip bump
          if [ "${{ inputs.force-rebuild }}" = "true" ]; then
            echo "bump=rebuild" >> "$GITHUB_OUTPUT"
            echo "version=$PREV_VERSION" >> "$GITHUB_OUTPUT"
            echo "Force rebuild: using version $PREV_VERSION"
            exit 0
          fi

          IFS='.' read -r MAJOR MINOR PATCH <<< "$PREV_VERSION"

          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log "$PREV_TAG"..HEAD --format="%s")
          else
            COMMITS=$(git log --format="%s")
          fi

          if [ -z "$COMMITS" ]; then
            echo "No new commits since $PREV_TAG"
            echo "bump=none" >> "$GITHUB_OUTPUT"
            echo "version=$PREV_VERSION" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BUMP="none"
          while IFS= read -r msg; do
            case "$msg" in
              *"BREAKING CHANGE"*|*"!"*) BUMP="major" ;;
            esac
          done <<< "$COMMITS"

          if [ "$BUMP" = "none" ]; then
            while IFS= read -r msg; do
              case "$msg" in
                feat*) [ "$BUMP" != "major" ] && BUMP="minor" ;;
              esac
            done <<< "$COMMITS"
          fi

          if [ "$BUMP" = "none" ]; then
            while IFS= read -r msg; do
              case "$msg" in
                fix*|perf*|refactor*) BUMP="patch" ;;
              esac
            done <<< "$COMMITS"
          fi

          [ "$BUMP" = "none" ] && BUMP="patch"

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Bump: $BUMP | $PREV_VERSION -> $NEW_VERSION"

  # ── Detect what changed since last tag ──
  changes:
    needs: version
    if: needs.version.outputs.bump != 'none'
    runs-on: ubuntu-latest
    outputs:
      charts: ${{ steps.detect.outputs.charts }}
      images: ${{ steps.detect.outputs.images }}
      has-charts: ${{ steps.detect.outputs.has-charts }}
      has-images: ${{ steps.detect.outputs.has-images }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed apps
        id: detect
        shell: bash
        run: |
          FORCE="${{ inputs.force-rebuild }}"
          PREV_TAG="${{ needs.version.outputs.prev-tag }}"

          # Force rebuild: include ALL charts and images
          if [ "$FORCE" = "true" ]; then
            CHARTS='[]'
            IMAGES='[]'
            if [ -d src ]; then
              for app_dir in src/*/; do
                app=$(basename "$app_dir")
                if [ -d "src/$app/chart" ]; then
                  CHARTS=$(echo "$CHARTS" | jq -c --arg a "$app" '. + [$a]')
                fi
                if [ -d "src/$app/containers" ]; then
                  for img_dir in src/$app/containers/*/; do
                    if [ -d "$img_dir" ]; then
                      img=$(basename "$img_dir")
                      IMAGES=$(echo "$IMAGES" | jq -c --arg a "$app/$img" '. + [$a]')
                    fi
                  done
                fi
              done
            fi
            echo "charts=$CHARTS" >> "$GITHUB_OUTPUT"
            echo "images=$IMAGES" >> "$GITHUB_OUTPUT"
            echo "has-charts=$( [ "$CHARTS" != '[]' ] && echo true || echo false )" >> "$GITHUB_OUTPUT"
            echo "has-images=$( [ "$IMAGES" != '[]' ] && echo true || echo false )" >> "$GITHUB_OUTPUT"
            echo "Force rebuild ALL — Charts: $CHARTS | Images: $IMAGES"
            exit 0
          fi

          # Normal mode: detect changes via git diff
          if [ -n "$PREV_TAG" ]; then
            CHANGED=$(git diff --name-only "$PREV_TAG"..HEAD)
          else
            CHANGED=$(git ls-files)
          fi

          CHARTS='[]'
          if [ -d src ]; then
            for app_dir in src/*/; do
              app=$(basename "$app_dir")
              if [ -d "src/$app/chart" ] && echo "$CHANGED" | grep -q "^src/$app/chart/"; then
                CHARTS=$(echo "$CHARTS" | jq -c --arg a "$app" '. + [$a]')
              fi
            done
          fi

          IMAGES='[]'
          if [ -d src ]; then
            for app_dir in src/*/; do
              app=$(basename "$app_dir")
              if [ -d "src/$app/containers" ] && echo "$CHANGED" | grep -q "^src/$app/containers/"; then
                for img_dir in src/$app/containers/*/; do
                  if [ -d "$img_dir" ]; then
                    img=$(basename "$img_dir")
                    if echo "$CHANGED" | grep -q "^src/$app/containers/$img/"; then
                      IMAGES=$(echo "$IMAGES" | jq -c --arg a "$app/$img" '. + [$a]')
                    fi
                  fi
                done
              fi
            done
          fi

          echo "charts=$CHARTS" >> "$GITHUB_OUTPUT"
          echo "images=$IMAGES" >> "$GITHUB_OUTPUT"
          echo "has-charts=$( [ "$CHARTS" != '[]' ] && echo true || echo false )" >> "$GITHUB_OUTPUT"
          echo "has-images=$( [ "$IMAGES" != '[]' ] && echo true || echo false )" >> "$GITHUB_OUTPUT"
          echo "Charts to build: $CHARTS"
          echo "Images to build: $IMAGES"

  # ── Build and push charts (only changed or all on force) ──
  build-charts:
    needs: [version, changes]
    if: needs.changes.outputs.has-charts == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        chart: ${{ fromJson(needs.changes.outputs.charts) }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: oras-project/setup-oras@v1

      - name: Build and push chart
        shell: bash
        env:
          REGISTRY: ${{ inputs.registry-charts }}
          USER: ${{ inputs.registry-user }}
          PASSWORD: ${{ secrets.registry-password }}
          APP: ${{ matrix.chart }}
        run: |
          REGISTRY_HOST=$(echo "$REGISTRY" | sed 's|oci://||' | cut -d/ -f1)
          echo "$PASSWORD" | helm registry login "$REGISTRY_HOST" -u "$USER" --password-stdin
          echo "$PASSWORD" | oras login "$REGISTRY_HOST" -u "$USER" --password-stdin

          chart_dir="src/$APP/chart"
          NAME=$(grep '^name:' "$chart_dir/Chart.yaml" | awk '{print $2}')
          # Each chart is versioned independently from the plugin. The plugin
          # manifest references each chart by its own Chart.yaml version, which
          # keeps both producer and consumer in sync without having to bump the
          # chart on every plugin release.
          CHART_VERSION=$(grep '^version:' "$chart_dir/Chart.yaml" | awk '{print $2}' | tr -d '"')

          if grep -q '^dependencies:' "$chart_dir/Chart.yaml" 2>/dev/null; then
            helm dependency update "$chart_dir/"
          fi

          helm package "$chart_dir/"
          helm push "${NAME}-${CHART_VERSION}.tgz" "$REGISTRY"
          rm -f "${NAME}-${CHART_VERSION}.tgz"

          # Re-tag pushed chart as `latest` so consumers can pull a stable
          # mutable tag without pinning a specific version.
          REGISTRY_PATH=$(echo "$REGISTRY" | sed 's|oci://||')
          oras tag "${REGISTRY_PATH}/${NAME}:${CHART_VERSION}" latest

          echo "Pushed $NAME:$CHART_VERSION + latest"

  # ── Build and push images (only changed or all on force) ──
  build-images:
    needs: [version, changes]
    if: needs.changes.outputs.has-images == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image: ${{ fromJson(needs.changes.outputs.images) }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.registry-images }}
          username: ${{ inputs.registry-user }}
          password: ${{ secrets.registry-password }}

      - name: Build and push image
        shell: bash
        env:
          VERSION: ${{ needs.version.outputs.version }}
          ENTRY: ${{ matrix.image }}
        run: |
          app=$(echo "$ENTRY" | cut -d/ -f1)
          img=$(echo "$ENTRY" | cut -d/ -f2)
          docker buildx build \
            --push \
            --tag "${{ inputs.registry-images }}/$img:$VERSION" \
            --tag "${{ inputs.registry-images }}/$img:latest" \
            "src/$app/containers/$img/"
          echo "Pushed $img:$VERSION + latest"

  # ── Publish template as OCI artifact + create git tag ──
  publish:
    needs: [version, changes, build-charts, build-images]
    if: |
      always() &&
      needs.version.outputs.bump != 'none' &&
      !contains(needs.*.result, 'failure')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Update plugin.yaml version
        shell: bash
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          sed -i "s/^  version:.*/  version: $VERSION/" template/plugin.yaml

          # Replace :latest in chart references with the real version of each
          # chart, read from its src/<name>/chart/Chart.yaml. Image references
          # keep :latest because images always publish a :latest tag on release.
          # This avoids the desync where the plugin bumps to a new version but
          # a chart wasn't republished and the manifest points to a missing
          # chart:VERSION tag.
          python3 - <<'PY'
          import re
          from pathlib import Path

          plugin = Path("template/plugin.yaml")
          text = plugin.read_text()

          # Match chart refs like:
          #   oci://ghcr.io/<owner>/<plugin>/charts/<name>:latest
          chart_pattern = re.compile(
              r"(oci://[^\s]+/charts/([A-Za-z0-9._-]+)):latest"
          )

          def resolve(match: re.Match) -> str:
              base, name = match.group(1), match.group(2)
              chart_yaml = Path(f"src/{name}/chart/Chart.yaml")
              if not chart_yaml.exists():
                  print(f"WARN: {chart_yaml} not found; leaving :latest for {name}")
                  return match.group(0)
              for line in chart_yaml.read_text().splitlines():
                  if line.startswith("version:"):
                      ver = line.split(":", 1)[1].strip().strip('"').strip("'")
                      print(f"Resolved {name}: latest -> {ver}")
                      return f"{base}:{ver}"
              print(f"WARN: no version field in {chart_yaml}; leaving :latest")
              return match.group(0)

          new_text = chart_pattern.sub(resolve, text)
          plugin.write_text(new_text)
          PY

          echo "--- Updated plugin.yaml ---"
          cat template/plugin.yaml

      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ inputs.registry-user }}
          password: ${{ secrets.registry-password }}

      - name: Install ORAS
        uses: oras-project/setup-oras@v1

      - name: Push template as OCI artifact (version + latest)
        shell: bash
        working-directory: template
        run: |
          oras push "${{ inputs.registry-manifest }}:${{ needs.version.outputs.version }}" .
          oras push "${{ inputs.registry-manifest }}:latest" .
          echo "Published template: ${{ needs.version.outputs.version }} + latest"

      - name: Create and push git tag
        if: inputs.force-rebuild == false
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ needs.version.outputs.version }}" -m "Release v${{ needs.version.outputs.version }}"
          git push origin "v${{ needs.version.outputs.version }}"
