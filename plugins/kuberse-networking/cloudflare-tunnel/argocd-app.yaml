apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudflare-tunnel
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    chart: kuberse-networking
    repoURL: oci://gitea-http.platform.svc.cluster.local:3000/marioapgs/charts/kuberse-networking
    targetRevision: 0.1.0
    helm:
      values: |
        cloudflare-tunnel:
          enabled: true
          cloudflare:
            domain: "kuberse.net"
  destination:
    server: https://kubernetes.default.svc
    namespace: networking
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
