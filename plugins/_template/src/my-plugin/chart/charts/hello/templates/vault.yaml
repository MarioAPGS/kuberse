{{- if .Values.vault.enabled }}
---
# VaultConnection: connects to the platform Vault instance
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultConnection
metadata:
  name: vault-connection
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "hello.labels" . | nindent 4 }}
spec:
  address: {{ .Values.vault.host }}
---
# VaultAuth: authenticates using Kubernetes service account
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultAuth
metadata:
  name: hello-auth
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "hello.labels" . | nindent 4 }}
spec:
  vaultConnectionRef: vault-connection
  method: kubernetes
  mount: kubernetes
  kubernetes:
    role: hello-role
    serviceAccount: {{ include "hello.serviceAccountName" . }}
---
# VaultStaticSecret: syncs application config secrets from Vault to a K8s Secret
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: hello-config-vault
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "hello.labels" . | nindent 4 }}
spec:
  type: kv-v2
  mount: secret
  path: {{ .Values.vault.configSecretPath }}
  destination:
    name: hello-config-secrets
    create: true
    overwrite: true
    transformation:
      excludeRaw: true
      templates:
        # Add your application secrets here, e.g.:
        # APP_SECRET_KEY:
        #   text: "{{`{{ .Secrets.APP_SECRET_KEY }}`}}"
        _placeholder:
          text: "placeholder"
  refreshAfter: 30s
  vaultAuthRef: hello-auth
{{- if .Values.postgresql.enabled }}
---
# VaultStaticSecret: syncs database connection secrets
# Dual-labeled: pgdb triggers postgres DB auto-creation, cbdb triggers CloudBeaver registration
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: hello-db-vault
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "hello.labels" . | nindent 4 }}
spec:
  type: kv-v2
  mount: secret
  path: {{ .Values.vault.dbSecretPath }}
  destination:
    name: hello-db-secrets
    create: true
    overwrite: true
    labels:
      # pgdb label: the postgres provisioner CronJob discovers this Secret and
      # auto-creates the database + user from the connection string in this key
      pgdb: PG_CONNECTION_STRING
      {{- if .Values.cloudbeaver.enabled }}
      # cbdb label: the CloudBeaver onboarding CronJob discovers this Secret and
      # auto-registers the database connection in CloudBeaver's data-sources
      cbdb: PG_CONNECTION_STRING
      {{- end }}
    transformation:
      excludeRaw: true
      templates:
        PG_CONNECTION_STRING:
          text: "{{`{{ .Secrets.PG_CONNECTION_STRING }}`}}"
  refreshAfter: 30s
  vaultAuthRef: hello-auth
{{- end }}
{{- end }}
