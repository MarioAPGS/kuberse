name: Publish Plugin

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      build-all:
        description: Build all artifacts ignoring change detection (keeps current version)
        type: boolean
        default: false

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute registry paths
        id: registry
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "REGISTRY_HOST=ghcr.io" >> "$GITHUB_ENV"
          echo "REGISTRY_IMAGES=ghcr.io/${OWNER}/kuberse" >> "$GITHUB_ENV"
          echo "REGISTRY_CHARTS=oci://ghcr.io/${OWNER}/PLUGIN_NAME-plugin/charts" >> "$GITHUB_ENV"
          echo "REGISTRY_MANIFEST=ghcr.io/${OWNER}/PLUGIN_NAME-plugin" >> "$GITHUB_ENV"
          echo "REGISTRY_USER=${{ github.actor }}" >> "$GITHUB_ENV"

      - name: Compute version
        id: semver
        run: |
          PREV_TAG=$(git tag -l 'v*' --sort=-v:refname | head -1)
          if [ -z "$PREV_TAG" ]; then
            PREV_TAG=""
            PREV_VERSION="0.0.0"
          else
            PREV_VERSION="${PREV_TAG#v}"
          fi
          echo "prev-tag=$PREV_TAG" >> "$GITHUB_OUTPUT"

          if [ "${{ inputs.build-all }}" = "true" ]; then
            echo "bump=rebuild" >> "$GITHUB_OUTPUT"
            echo "version=$PREV_VERSION" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          IFS='.' read -r MAJOR MINOR PATCH <<< "$PREV_VERSION"
          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log "$PREV_TAG"..HEAD --format="%s")
          else
            COMMITS=$(git log --format="%s")
          fi

          if [ -z "$COMMITS" ]; then
            echo "bump=none" >> "$GITHUB_OUTPUT"
            echo "version=$PREV_VERSION" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BUMP="none"
          while IFS= read -r msg; do
            case "$msg" in *"BREAKING CHANGE"*|*!:*) BUMP="major" ;; esac
          done <<< "$COMMITS"
          if [ "$BUMP" = "none" ]; then
            while IFS= read -r msg; do
              case "$msg" in feat*) [ "$BUMP" != "major" ] && BUMP="minor" ;; esac
            done <<< "$COMMITS"
          fi
          if [ "$BUMP" = "none" ]; then
            while IFS= read -r msg; do
              case "$msg" in fix*|perf*|refactor*) BUMP="patch" ;; esac
            done <<< "$COMMITS"
          fi
          [ "$BUMP" = "none" ] && BUMP="patch"

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"
          echo "version=$MAJOR.$MINOR.$PATCH" >> "$GITHUB_OUTPUT"

      - name: Detect changes
        id: changes
        if: steps.semver.outputs.bump != 'none'
        run: |
          PREV_TAG="${{ steps.semver.outputs.prev-tag }}"
          if [ "${{ inputs.build-all }}" = "true" ] || [ -z "$PREV_TAG" ]; then
            CHANGED=$(git ls-files)
          else
            CHANGED=$(git diff --name-only "$PREV_TAG"..HEAD)
          fi

          CHARTS=""
          IMAGES=""
          if [ -d src ]; then
            for app_dir in src/*/; do
              app=$(basename "$app_dir")
              if [ -d "src/$app/chart" ]; then
                if [ "${{ inputs.build-all }}" = "true" ] || echo "$CHANGED" | grep -q "^src/$app/chart/"; then
                  CHARTS="$CHARTS $app"
                fi
              fi
              if [ -d "src/$app/containers" ]; then
                for img_dir in src/$app/containers/*/; do
                  [ -d "$img_dir" ] || continue
                  img=$(basename "$img_dir")
                  if [ "${{ inputs.build-all }}" = "true" ] || echo "$CHANGED" | grep -q "^src/$app/containers/$img/"; then
                    IMAGES="$IMAGES $app/$img"
                  fi
                done
              fi
            done
          fi

          echo "charts=$CHARTS" >> "$GITHUB_OUTPUT"
          echo "images=$IMAGES" >> "$GITHUB_OUTPUT"

      - uses: oras-project/setup-oras@v1
        if: steps.semver.outputs.bump != 'none'

      - name: Registry login
        if: steps.semver.outputs.bump != 'none'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login "$REGISTRY_HOST" -u "$REGISTRY_USER" --password-stdin
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login "$REGISTRY_HOST" -u "$REGISTRY_USER" --password-stdin
          echo "${{ secrets.GITHUB_TOKEN }}" | oras login "$REGISTRY_HOST" -u "$REGISTRY_USER" --password-stdin

      - name: Build and push charts
        if: steps.semver.outputs.bump != 'none' && steps.changes.outputs.charts != ''
        run: |
          for app in ${{ steps.changes.outputs.charts }}; do
            chart_dir="src/$app/chart"
            NAME=$(grep '^name:' "$chart_dir/Chart.yaml" | awk '{print $2}')
            CHART_VERSION=$(grep '^version:' "$chart_dir/Chart.yaml" | awk '{print $2}' | tr -d '"')

            if grep -q '^dependencies:' "$chart_dir/Chart.yaml" 2>/dev/null; then
              if [ -d "$chart_dir/charts" ]; then
                for sub in "$chart_dir"/charts/*/; do
                  [ -d "$sub" ] || continue
                  if [ -f "$sub/Chart.yaml" ] && grep -q '^dependencies:' "$sub/Chart.yaml" 2>/dev/null; then
                    helm dependency update "$sub"
                  fi
                done
              fi
              helm dependency update "$chart_dir/"
            fi

            helm package "$chart_dir/"
            helm push "${NAME}-${CHART_VERSION}.tgz" "$REGISTRY_CHARTS"
            rm -f "${NAME}-${CHART_VERSION}.tgz"

            REGISTRY_PATH=$(echo "$REGISTRY_CHARTS" | sed 's|oci://||')
            oras tag "${REGISTRY_PATH}/${NAME}:${CHART_VERSION}" latest
          done

      - name: Build and push images
        if: steps.semver.outputs.bump != 'none' && steps.changes.outputs.images != ''
        env:
          VERSION: "${{ steps.semver.outputs.version }}"
        run: |
          for entry in ${{ steps.changes.outputs.images }}; do
            app=$(echo "$entry" | cut -d/ -f1)
            img=$(echo "$entry" | cut -d/ -f2)
            docker build \
              --tag "$REGISTRY_IMAGES/$img:$VERSION" \
              --tag "$REGISTRY_IMAGES/$img:latest" \
              "src/$app/containers/$img/"
            docker push "$REGISTRY_IMAGES/$img:$VERSION"
            docker push "$REGISTRY_IMAGES/$img:latest"
          done

      - name: Publish OCI manifest
        if: steps.semver.outputs.bump != 'none'
        working-directory: template
        env:
          VERSION: "${{ steps.semver.outputs.version }}"
        run: |
          sed -i "s/^  version:.*/  version: $VERSION/" plugin.yaml
          oras push "${REGISTRY_MANIFEST}:${VERSION}" .
          oras push "${REGISTRY_MANIFEST}:latest" .

      - name: Create git tag
        if: steps.semver.outputs.bump != 'none' && steps.semver.outputs.bump != 'rebuild'
        env:
          VERSION: "${{ steps.semver.outputs.version }}"
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${VERSION}" -m "Release v${VERSION}"
          git push origin "v${VERSION}"
