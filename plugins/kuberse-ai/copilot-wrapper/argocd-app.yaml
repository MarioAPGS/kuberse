apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: copilot-wrapper
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    chart: kuberse-ai
    repoURL: oci://gitea-http.platform.svc.cluster.local:3000/marioapgs/charts/kuberse-ai
    targetRevision: 0.2.0
    helm:
      values: |
        copilot-wrapper:
          enabled: false
          image:
            repository: gitea-http.platform.svc.cluster.local:3000/marioapgs/copilot-wrapper
  destination:
    server: https://kubernetes.default.svc
    namespace: ai-infra
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
