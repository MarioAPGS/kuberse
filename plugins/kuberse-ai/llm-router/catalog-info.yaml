apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: llm-router
  namespace: ai-infra
  description: >
    LiteLLM Proxy — OpenAI-compatible gateway with free-tier rotation and
    quota tracking. Single entry point for all LLM traffic.
  annotations:
    backstage.io/techdocs-ref: url:http://gitea-http.platform.svc.cluster.local:3000/marioapgs/kuberse-ai/tree/main/src/kuberse-ai/chart/charts/llm-router
    backstage.io/kubernetes-id: llm-router
    backstage.io/kubernetes-namespace: ai-infra
    backstage.io/kubernetes-label-selector: app.kubernetes.io/name=llm-router
  links:
    - url: http://gitea-http.platform.svc.cluster.local:3000/marioapgs/kuberse-ai/tree/main/src/kuberse-ai/chart/charts/llm-router
      title: Helm Chart
      icon: github
    - url: https://docs.litellm.ai/
      title: LiteLLM Docs
      icon: docs
spec:
  type: service
  lifecycle: production
  owner: group:default/admins
  system: kuberse-ai
  dependsOn:
    - component:ai-infra/redis-ai
