apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bootstrap-kuberse-ai
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: http://gitea-http.platform.svc.cluster.local:3000/marioapgs/kuberse
    targetRevision: main
    path: plugins/kuberse-ai
    directory:
      recurse: true
      include: "{*/argocd-app.yaml}"
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
